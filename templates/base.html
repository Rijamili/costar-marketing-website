<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Costar Marketing Management LLC</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Particles background -->

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<!-- Three.js for galaxy animation -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

</head>

<body>

<!-- Galaxy Background -->

<div id="particles-js"></div>

<!-- HEADER -->

<header>

<nav class="navbar">

<a href="/" class="logo">COSTAR</a>

<a href="/">Home</a>
<a href="/services">Services</a>
<a href="/books">Books</a>
<a href="/company">Company</a>
<a href="/contact">Contact</a>
<a href="/login">Login</a>

</nav>

</header>

<!-- PAGE CONTENT -->

<div class="container">
{% block content %}{% endblock %}
</div>

<!-- ================= AI CHATBOT ================= -->

<div class="chatbot">

<div class="chat-header">
AI Assistant
</div>

<div id="chat-box" class="chat-body"></div>

<input id="chat-input" placeholder="Ask a question">

<button onclick="sendMessage()">Send</button>

</div>

<!-- CHATBOT SCRIPT -->

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>

<!-- PARTICLES GALAXY BACKGROUND -->

<script>

particlesJS("particles-js",{

particles:{

number:{ value:120 },

color:{ value:"#7a2cff" },

size:{ value:3 },

move:{ speed:2 },

line_linked:{
enable:true,
color:"#7a2cff"
}

}

});

</script>

<!-- THREE.JS GALAXY ANIMATION -->

<script src="{{ url_for('static', filename='js/galaxy.js') }}"></script>

</body>

</html>
